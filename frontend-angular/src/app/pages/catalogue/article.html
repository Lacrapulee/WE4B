<div class="group relative bg-white rounded-lg shadow hover:shadow-lg transition-shadow overflow-hidden">
  <a [routerLink]="['/item', item.id]" class="block" [attr.title]="item.titre">
    <img [src]="'/assets/img/' + (item.image || 'default.png')" alt="Produit" class="product-thumb w-full h-48 object-cover">
    <div class="p-4">
      <h3 class="font-bold truncate">{{ item.titre }}</h3>
      <p class="text-blue-600">{{ item.prix | number:'1.2-2':'fr-FR' }} €</p>

      <div class="mt-3">
        <div class="text-gray-700 text-sm truncate">{{ item.ville_nom }}</div>
        <div class="mt-3 flex gap-2 items-center">
          <span class="badge">{{ item.ville_nom | uppercase }}</span>
          <span class="badge">{{ item.categorie_nom | uppercase }}</span>
        </div>
      </div>
    </div>
  </a>

  <app-favoris-button *ngIf="isLoggedIn"
                      [isFavoris]="item.isFavoris"
                      [disabled]="userId === item.vendeur_id"
                      (toggle)="onToggleFavoris()"
                      aria-label="Ajouter aux favoris">
  </app-favoris-button>
</div>
