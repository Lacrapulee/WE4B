<div class="group relative bg-white rounded-lg shadow hover:shadow-lg transition-shadow overflow-visible flex flex-col h-full">
  <a [routerLink]="['/item', item.id]" class="block flex-1" [attr.title]="item.titre">
    <img [src]="'/assets/img/' + (item.image || 'default.png')" alt="Produit" class="product-thumb w-full h-48 object-cover rounded-t-lg">
    <div class="p-4 flex flex-col justify-between h-[calc(100%-12rem)]">
      <div>
        <h3 class="font-bold truncate text-gray-900">{{ item.titre }}</h3>
        <p class="text-blue-600 font-bold mt-1">{{ item.prix | number:'1.2-2':'fr-FR' }} €</p>
      </div>

      <div class="mt-4">
        <div class="mt-2 flex gap-2 items-center text-xs">
          <span class="badge bg-gray-100 px-2 py-1 rounded">{{ item.ville_nom | uppercase }}</span>
          <span class="badge bg-gray-100 px-2 py-1 rounded">{{ item.categorie_nom | uppercase }}</span>
        </div>
      </div>
    </div>
  </a>

  <!-- Seller Profile on Card -->
  <div *ngIf="item.vendeur_nom && item.vendeur_prenom" class="px-4 py-3 border-t bg-gray-50 flex items-center gap-3 rounded-b-lg">
    <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-500 font-bold text-sm">
      {{ item.vendeur_prenom.charAt(0) | uppercase }}{{ item.vendeur_nom.charAt(0) | uppercase }}
    </div>
    <div class="text-sm">
      <span class="text-gray-500">Vendu par </span>
      <a [routerLink]="['/user', item.vendeur_id]" class="font-bold text-gray-900 hover:text-blue-600 hover:underline transition-colors z-20 relative">
        {{ item.vendeur_prenom }}
      </a>
    </div>
  </div>

  <app-favoris-button *ngIf="isLoggedIn"
                      class="absolute top-2 right-2 z-10"
                      [isFavoris]="item.isFavoris"
                      [disabled]="isOwnItem()"
                      (toggle)="onToggleFavoris()"
                      aria-label="Ajouter aux favoris">
  </app-favoris-button>
</div>
