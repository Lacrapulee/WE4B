<div class="max-w-3xl mx-auto px-4 py-12">
  <div *ngIf="loading" class="text-center py-20">
    <p class="text-gray-500 font-medium">Chargement...</p>
  </div>

  <div *ngIf="error && !loading" class="bg-red-50 border border-red-200 rounded-xl p-6 text-center">
    <h2 class="text-red-700 font-bold text-xl mb-2">Impossible de procéder au paiement</h2>
    <p class="text-red-600 mb-6">{{ error }}</p>
    <a routerLink="/catalogue" class="inline-block bg-blue-600 text-white font-bold px-6 py-2 rounded-full hover:bg-blue-700 transition">
      Retour au catalogue
    </a>
  </div>

  <div *ngIf="paymentData && !loading" class="bg-white rounded-2xl shadow-sm border overflow-hidden">
    <div class="bg-gray-50 p-6 border-b">
      <h1 class="text-2xl font-bold text-gray-900">Validation de votre commande</h1>
    </div>
    
    <div class="p-6 md:p-8 flex flex-col md:flex-row gap-8">
      <div class="md:w-1/3">
        <img [src]="'http://localhost:8000/assets/img/' + paymentData.imageName" [alt]="paymentData.product.titre" class="w-full h-auto object-cover rounded-lg border">
      </div>
      
      <div class="md:w-2/3 space-y-6">
        <div>
          <h2 class="text-xl font-bold text-gray-900 mb-2">{{ paymentData.product.titre }}</h2>
          <p class="text-3xl font-black text-blue-600">{{ paymentData.priceLabel }}</p>
        </div>

        <form (ngSubmit)="onSubmitPayment()" class="space-y-4 pt-4 border-t">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Nom complet</label>
            <input type="text" [(ngModel)]="buyerName" name="buyerName" required
                   class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" 
                   placeholder="Votre nom complet">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Adresse email</label>
            <input type="email" [(ngModel)]="buyerEmail" name="buyerEmail" required
                   class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" 
                   placeholder="votre.email@exemple.com">
          </div>
          
          <div *ngIf="error" class="text-red-600 text-sm font-medium mt-2">
            {{ error }}
          </div>

          <button type="submit" [disabled]="isProcessing"
                  class="w-full mt-4 bg-green-600 text-white font-bold py-3 px-4 rounded-full hover:bg-green-700 transition shadow-sm disabled:opacity-50">
            {{ isProcessing ? 'Traitement en cours...' : 'Confirmer et Payer (Simulation)' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
