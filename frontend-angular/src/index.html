<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>FrontendAngular</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <!-- Critical inline styles to reduce flash of unstyled content -->
    <style>
      html, body { height: 100%; }
      body { background: #EDFCFD; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
      /* Hide app root until Angular bootstraps to avoid FOUC */
      body.preboot app-root { visibility: hidden; }
      /* Provide minimal layout so grid doesn't jump */
      body.preboot .max-w-7xl { max-width: 112rem; margin-left: auto; margin-right: auto; padding-left: 1rem; padding-right: 1rem; }
    </style>
    <!-- Quick Tailwind loader for development to ensure classes render even if PostCSS isn't run -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="preboot">
    <app-root></app-root>
  </body>
</html>
