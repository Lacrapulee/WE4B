<main class="page-annonce max-w-3xl mx-auto my-8 p-4">
  <div *ngIf="isLoading" class="text-center py-20">
    <p class="text-gray-500 font-medium">Chargement des informations...</p>
  </div>

  <div *ngIf="!isLoading" class="form-container bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <div class="flex justify-between items-center mb-8 border-b-2 border-blue-100 pb-4">
      <h2 class="text-3xl font-extrabold text-gray-900">Modifier mon annonce</h2>
      <a [routerLink]="['/item', itemId]" class="text-blue-600 hover:text-blue-800 text-sm font-bold">&larr; Retour à l'annonce</a>
    </div>

    <form [formGroup]="editForm" (ngSubmit)="onSubmit()" class="auth-form space-y-8">

      <!-- Informations générales -->
      <section class="bg-gray-50 p-6 rounded-lg border border-gray-100">
        <h3 class="text-xl font-bold mb-5 text-gray-800 flex items-center">
          <svg class="w-5 h-5 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          Informations générales
        </h3>
        
        <div class="form-group mb-5">
          <label for="titre" class="block text-sm font-semibold text-gray-700 mb-2">Titre de l'annonce <span class="text-red-500">*</span></label>
          <input type="text" id="titre" formControlName="titre"
                 class="w-full px-4 py-3 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 border-gray-300 transition-colors shadow-sm">
          <div *ngIf="editForm.get('titre')?.touched && editForm.get('titre')?.invalid" class="text-red-500 text-sm mt-1.5 font-medium">
            Le titre est requis.
          </div>
        </div>

        <div class="form-group mb-5">
          <label for="categorie" class="block text-sm font-semibold text-gray-700 mb-2">Catégorie <span class="text-red-500">*</span></label>
          <select id="categorie" formControlName="categorie_id"
                  class="w-full px-4 py-3 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 border-gray-300 bg-white transition-colors shadow-sm appearance-none">
            <option value="">-- Choisir une catégorie --</option>
            <option *ngFor="let categorie of categories" [value]="categorie.id">
              {{ categorie.nom }}
            </option>
          </select>
        </div>

        <div class="form-group mb-5">
          <label for="description" class="block text-sm font-semibold text-gray-700 mb-2">Description détaillée <span class="text-red-500">*</span></label>
          <textarea id="description" formControlName="description" rows="5"
                    class="w-full px-4 py-3 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 border-gray-300 transition-colors shadow-sm"></textarea>
        </div>

        <div class="form-group mb-5">
          <label for="prix" class="block text-sm font-semibold text-gray-700 mb-2">Prix (€) <span class="text-red-500">*</span></label>
          <div class="relative">
            <input type="number" id="prix" step="0.01" formControlName="prix"
                   class="w-full pl-4 pr-10 py-3 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 border-gray-300 transition-colors shadow-sm">
            <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
              <span class="text-gray-500 font-semibold">€</span>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="statut" class="block text-sm font-semibold text-gray-700 mb-2">Statut de l'annonce <span class="text-red-500">*</span></label>
          <select id="statut" formControlName="statut"
                  class="w-full px-4 py-3 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 border-gray-300 bg-white transition-colors shadow-sm appearance-none">
            <option value="en_ligne">En ligne</option>
            <option value="vendu">Vendu</option>
            <option value="brouillon">Brouillon</option>
          </select>
        </div>
      </section>

      <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4" role="alert">
        <strong class="font-bold">Erreur : </strong>
        <span class="block sm:inline">{{ errorMessage }}</span>
      </div>

      <div class="pt-4">
        <button type="submit" [disabled]="editForm.invalid || isSaving"
                class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-md text-base font-bold text-white bg-[var(--primary-blue)] hover:bg-[var(--primary-blue-dark)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:bg-gray-400 disabled:cursor-not-allowed transition-all transform hover:-translate-y-0.5 disabled:transform-none">
          <span *ngIf="!isSaving">Enregistrer les modifications</span>
          <span *ngIf="isSaving">Enregistrement...</span>
        </button>
      </div>
    </form>
  </div>
</main>
