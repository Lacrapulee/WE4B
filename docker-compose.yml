services:
  # 1. Ta base de données
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: WE4ADB
    ports:
      - "3306:3306"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/seed.sql
  
  # 2. Ton application PHP (L'API)
  php:
    build: ./docker/php
    restart: always
    ports:
      - "8000:80" # Ton API sera sur http://localhost:8000
    volumes:
      - ./Back-end/src:/var/www/html
    depends_on:
      - db

  # 3. L'interface graphique pour gérer la DB
  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8080:80" # phpMyAdmin sera sur http://localhost:8080
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      - db

  # 4. Le Front-End Angular
  angular:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "4200:4200"
    volumes:
      - ./Front-end:/app  # Remplace 'angular-app' par le nom de ton dossier Angular
    command: sh -c "npm install && npm run start -- --host 0.0.0.0"
    depends_on:
      - php