version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: WE4ADB
    ports:
      - "3306:3306"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    # AJOUT : Permet de vérifier si MySQL est vraiment prêt
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 5s
      retries: 5

  php:
    build: ./docker/php
    restart: always
    ports:
      - "8000:80"
    volumes:
      # Ajuste ici : assure-toi que le dossier monté contient bien le dossier "public" requis par ton Dockerfile
      - ./Back-end/src:/var/www/html 
    depends_on:
      db:
        condition: service_healthy # Attend que la DB soit prête, pas juste démarrée

  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    depends_on:
      db:
        condition: service_healthy

  angular:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "4200:4200"
    volumes:
      - ./Front-end:/app
    command: sh -c "npm install && npm run start -- --host 0.0.0.0"
    depends_on:
      - php