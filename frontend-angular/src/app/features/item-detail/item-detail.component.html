<section class="max-w-4xl mx-auto px-4 py-16">
  <ng-container *ngIf="item; else notFound">
    <div class="grid gap-8 md:grid-cols-[1.1fr_0.9fr] items-start">
      <img class="w-full rounded-3xl shadow-lg object-cover aspect-[4/3]" [src]="'/assets/img/' + item.image" [alt]="item.titre" />
      <div class="rounded-3xl bg-white shadow-lg border border-gray-100 p-8">
        <p class="text-xs font-bold uppercase tracking-[0.3em] text-blue-500 mb-4">Annonce</p>
        <h1 class="text-3xl font-black text-gray-900">{{ item.titre }}</h1>
        <p class="mt-4 text-2xl font-bold text-blue-600">{{ item.prix | number:'1.2-2':'fr-FR' }} €</p>
        <p class="mt-6 text-gray-600 leading-7">{{ item.description }}</p>
        <div class="mt-6 flex flex-wrap gap-2 text-sm font-semibold">
          <span class="rounded-full bg-gray-100 px-3 py-1">{{ item.ville_nom }}</span>
          <span class="rounded-full bg-gray-100 px-3 py-1">{{ item.categorie_nom }}</span>
        </div>
        <a routerLink="/catalogue" class="inline-flex mt-8 rounded-full bg-blue-600 px-5 py-3 text-white font-semibold hover:bg-blue-700 transition-colors">
          Retour au catalogue
        </a>
      </div>
    </div>
  </ng-container>

  <ng-template #notFound>
    <div class="rounded-3xl bg-white shadow-lg border border-gray-100 p-8">
      <h1 class="text-3xl font-black text-gray-900 mb-4">Annonce introuvable</h1>
      <p class="text-gray-600">Cette route Angular remplace l’ancien endpoint PHP pour le détail d’article.</p>
      <a routerLink="/catalogue" class="inline-flex mt-8 rounded-full bg-blue-600 px-5 py-3 text-white font-semibold hover:bg-blue-700 transition-colors">
        Retour au catalogue
      </a>
    </div>
  </ng-template>
</section>
