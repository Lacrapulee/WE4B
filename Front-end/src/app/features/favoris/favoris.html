<div class="container mx-auto p-4 max-w-6xl">
  <h1 class="text-2xl font-bold mb-6">Mes Articles Favoris</h1>

  <div *ngIf="loading" class="text-center py-10 text-gray-500">
    Chargement des favoris...
  </div>

  <div *ngIf="!loading && items.length === 0" class="bg-gray-50 p-10 text-center rounded-lg shadow-sm border">
    <p class="text-gray-500 text-lg mb-4">Vous n'avez pas encore d'articles favoris.</p>
    <a routerLink="/catalogue" class="text-blue-600 hover:underline">Découvrir le catalogue</a>
  </div>

  <div *ngIf="!loading && items.length > 0" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    <app-article *ngFor="let item of items" 
                 [item]="item" 
                 [isLoggedIn]="true" 
                 (toggleFavoris)="onToggleFavoris($event)">
    </app-article>
  </div>
</div>
