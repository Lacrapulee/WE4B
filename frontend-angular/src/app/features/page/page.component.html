<section class="max-w-4xl mx-auto px-4 py-16">
  <div class="rounded-3xl bg-white shadow-lg border border-gray-100 p-8 md:p-12">
    <h1 class="text-3xl md:text-5xl font-black text-gray-900 mb-4">{{ title }}</h1>
    <p class="text-lg text-gray-600 leading-8">{{ description }}</p>
    <p *ngIf="suffix" class="mt-6 text-sm text-gray-500">Identifiant: {{ suffix }}</p>
    <a routerLink="/catalogue" class="inline-flex mt-8 rounded-full bg-blue-600 px-5 py-3 text-white font-semibold hover:bg-blue-700 transition-colors">
      Retour au catalogue
    </a>
  </div>
</section>
