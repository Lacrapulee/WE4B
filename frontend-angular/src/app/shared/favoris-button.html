<button (click)="onClick($event)"
        [class.filled]="isFavoris"
        [attr.title]="disabled ? 'Non disponible' : 'Ajouter aux favoris'"
        class="favoris-btn absolute top-2 right-2 text-2xl opacity-80 hover:opacity-100 transition-opacity bg-white/90 shadow rounded-full w-8 h-8 flex items-center justify-center cursor-pointer text-red-500">
  <span>{{ isFavoris ? '♥' : '♡' }}</span>
</button>
