<div class="container mx-auto p-4 max-w-6xl">
  <div *ngIf="loading" class="text-center py-10 text-gray-500">
    Chargement du profil...
  </div>
  
  <div *ngIf="error" class="bg-red-100 text-red-700 p-4 rounded-lg mb-6">
    {{ error }}
  </div>

  <app-profile-card
    *ngIf="!loading && user"
    [user]="user"
    [isCurrentUser]="isCurrentUserProfile()"
    (userChanged)="onUserChanged($event)">
  </app-profile-card>

  <div *ngIf="!loading && user">
    <h2 class="text-xl font-bold mb-4 border-b pb-2">Articles de {{ user.prenom }}</h2>
    
    <div *ngIf="articles.length === 0" class="text-gray-500 py-4">
      Cet utilisateur n'a aucun article en vente.
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <app-article *ngFor="let item of articles" [item]="item" [isLoggedIn]="true" [userId]="user.id"></app-article>
    </div>
  </div>

  <app-profile-reviews
    *ngIf="!loading && user"
    [user]="user"
    [reviews]="reviews">
  </app-profile-reviews>
</div>
