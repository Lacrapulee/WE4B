<main class="max-w-7xl mx-auto px-4 py-8 w-full flex-grow">
  <section class="bg-white p-6 mb-10 shadow rounded-lg">
    <form [formGroup]="filterForm" (ngSubmit)="applyFilters()" class="space-y-4">
      
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div>
          <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Que cherchez-vous ?</label>
          <input type="text" formControlName="search" placeholder="Ex: Vélo, iPhone..." class="w-full rounded-lg p-2.5 outline-none bg-gray-50 border border-gray-200">
        </div>

        <div>
          <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Catégorie</label>
          <select formControlName="categorie" class="w-full rounded-lg p-2.5 outline-none bg-gray-50 border border-gray-200">
            <option value="">Toutes les catégories</option>
            <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.nom }}</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Ville</label>
          <input type="text" formControlName="ville" placeholder="Ex: Paris" class="w-full rounded-lg p-2.5 outline-none bg-gray-50 border border-gray-200">
        </div>

        <div>
          <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Distance (km)</label>
          <input type="number" formControlName="distance" placeholder="Ex: 50" min="0" class="w-full rounded-lg p-2.5 outline-none bg-gray-50 border border-gray-200">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
        <div>
          <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Prix Min</label>
          <input type="number" formControlName="prix_min" placeholder="€" class="w-full rounded-lg p-2.5 outline-none bg-gray-50 border border-gray-200">
        </div>

        <div>
          <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Prix Max</label>
          <input type="number" formControlName="prix_max" placeholder="€" class="w-full rounded-lg p-2.5 outline-none bg-gray-50 border border-gray-200">
        </div>

        <div>
          <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Tri</label>
          <select formControlName="tri" class="w-full rounded-lg p-2.5 outline-none bg-gray-50 border border-gray-200">
            <option value="date_recent">Date</option>
            <option value="date_ancien">Date ancienne</option>
            <option value="prix_min">Prix min</option>
            <option value="prix_max">Prix max</option>
            <option value="distance">Distance</option>
          </select>
        </div>

        <button type="submit" class="px-6 py-2.5 font-bold transition-all rounded-lg bg-blue-500 text-white hover:bg-blue-600 w-full">
          Appliquer
        </button>
      </div>
    </form>
  </section>

  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
    <ng-container *ngIf="items.length > 0; else noItems">
      
      <div *ngFor="let item of items" class="group relative bg-white rounded-lg shadow hover:shadow-lg transition-shadow overflow-hidden">
        <a [routerLink]="['/item', item.id]" class="block">
          <img [src]="'assets/img/' + (item.image || 'default.png')" alt="Produit" class="w-full h-48 object-cover">
          <div class="p-4">
            <h3 class="font-bold truncate">{{ item.titre }}</h3>
            <p class="text-blue-600">{{ item.prix | number:'1.2-2':'fr-FR' }} €</p>

            <div class="flex justify-between items-center mt-4">
              <span class="text-gray-400 text-[10px] font-bold uppercase">
                {{ item.ville_nom }}
                <span *ngIf="item.distance" class="text-blue-500 ml-1">({{ item.distance }} km)</span>
              </span>
              <span class="text-gray-400 text-[10px] font-bold uppercase">{{ item.categorie_nom }}</span>
            </div>
          </div>
        </a>

        <button *ngIf="isLoggedIn && userId !== item.vendeur_id" 
                (click)="toggleFavoris(item)"
                class="favoris-btn absolute top-2 right-2 text-2xl opacity-80 hover:opacity-100 transition-opacity bg-white/90 shadow rounded-full w-8 h-8 flex items-center justify-center cursor-pointer text-red-500">
          <span>{{ item.isFavoris ? '♥' : '♡' }}</span>
        </button>
      </div>

    </ng-container>

    <ng-template #noItems>
      <div class="col-span-full text-center py-20 text-gray-400">
        <p class="text-lg">Aucun article trouvé.</p>
      </div>
    </ng-template>
  </div>
</main>
